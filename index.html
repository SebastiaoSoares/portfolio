<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />

    <title>Sebastião Soares | Desenvolvedor Web</title>
    <meta
      name="description"
      content="Portfólio de Sebastião Soares, Desenvolvedor Web com foco no ecossistema JavaScript e Python. Construindo soluções eficientes e interfaces modernas."
    />
    <meta name="author" content="Sebastião Soares" />
    <meta
      name="keywords"
      content="Desenvolvedor Web, Front-end, Back-end, JavaScript, Python, React, Node.js"
    />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Sebastião Soares | Desenvolvedor Web" />
    <meta
      property="og:description"
      content="Construindo soluções eficientes e interfaces modernas. Foco no ecossistema JavaScript e Python."
    />
    <meta
      property="og:image"
      content="https://sebas.dev.br/assets/og-preview.jpg"
    />
    <meta
      property="og:image:secure_url"
      content="https://sebas.dev.br/assets/og-preview.jpg"
    />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Preview do portfólio de Sebastião Soares, Desenvolvedor Web."
    />

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
    <link
      rel="alternate icon"
      href="./assets/favicon.ico"
      type="image/x-icon"
    />
  </head>
  <body
    class="bg-slate-950 text-slate-300 font-sans antialiased min-h-dvh w-full flex items-center justify-center p-4 relative overflow-hidden"
  >
    <div
      class="w-full h-full absolute bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-amber-400 bg-slate-950 opacity-10"
    ></div>

    <main class="w-full max-w-lg relative group">
      <div
        class="absolute -inset-2 bg-amber-500/5 blur-2xl rounded-3xl transition-all duration-700 group-hover:bg-amber-500/5 group-hover:-inset-3 pointer-events-none"
      ></div>

      <section
        class="relative bg-slate-950/40 backdrop-blur-xl rounded-2xl p-6 sm:p-8 border border-white/5 shadow-2xl transition-all duration-500 group-hover:border-amber-500/30"
      >
        <div
          class="absolute inset-x-12 -top-px h-px bg-gradient-to-r from-transparent via-amber-500/60 to-transparent transition-opacity duration-500 opacity-75 group-hover:opacity-100"
        ></div>

        <header class="mb-8">
          <span
            class="block font-mono text-xs text-slate-500 tracking-widest mb-3 uppercase"
            aria-hidden="true"
            >sebas.dev.br</span
          >
          <h1
            class="text-4xl md:text-5xl font-bold text-gray-300 tracking-tight mb-2"
          >
            Sebastião Soares
          </h1>
          <h2
            class="text-amber-500 font-mono text-sm tracking-widest lowercase"
          >
            desenvolvedor web
          </h2>
        </header>

        <p
          class="text-slate-400 leading-relaxed mb-6 font-mono text-sm min-h-[4rem] sm:min-h-[3rem]"
        >
          <span class="sr-only"
            >Construindo soluções eficientes e interfaces modernas. Foco no
            ecossistema JavaScript e Python.</span
          >
          <span aria-hidden="true" class="text-orange-500 mr-2 font-bold"
            >~/$</span
          >
          <span aria-hidden="true" id="typewriter"></span>
          <span
            aria-hidden="true"
            class="inline-block w-2 h-4 bg-slate-400 animate-pulse ml-1 align-middle"
          ></span>
        </p>

        <div
          class="flex flex-wrap gap-2 mb-8"
          aria-label="Tecnologias principais"
        >
          <span
            translate="no"
            class="px-3 py-1 text-xs font-semibold bg-yellow-900/30 text-yellow-300 rounded-full border border-yellow-800/50"
            >JavaScript</span
          >
          <span
            translate="no"
            class="px-3 py-1 text-xs font-semibold bg-cyan-900/30 text-cyan-300 rounded-full border border-cyan-800/50"
            >React</span
          >
          <span
            translate="no"
            class="px-3 py-1 text-xs font-semibold bg-blue-900/30 text-blue-300 rounded-full border border-blue-800/50"
            >Python</span
          >
          <span
            translate="no"
            class="px-3 py-1 text-xs font-semibold bg-emerald-900/30 text-emerald-300 rounded-full border border-emerald-800/50"
            >Node.js</span
          >
        </div>

        <div
          class="flex flex-col sm:flex-row sm:items-center justify-between border-t border-white/5 pt-6 gap-4 sm:gap-0"
        >
          <nav aria-label="Redes Sociais e Contato">
            <ul class="flex items-center space-x-5">
              <li>
                <a
                  id="githubLink"
                  href=""
                  target="_blank"
                  rel="noopener noreferrer"
                  class="inline-block p-1 text-slate-400 transition-all transform rounded-md hover:text-gray-300 hover:scale-110 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:text-gray-300 focus:scale-110"
                  aria-label="Acessar meu perfil no GitHub"
                  title="GitHub"
                >
                  <ion-icon
                    name="logo-github"
                    class="text-3xl"
                    aria-hidden="true"
                  ></ion-icon>
                </a>
              </li>
              <li>
                <a
                  id="linkedInLink"
                  href=""
                  target="_blank"
                  rel="noopener noreferrer"
                  class="inline-block p-1 text-slate-400 transition-all transform rounded-md hover:text-gray-300 hover:scale-110 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:text-gray-300 focus:scale-110"
                  aria-label="Acessar meu perfil no LinkedIn"
                  title="LinkedIn"
                >
                  <ion-icon
                    name="logo-linkedin"
                    class="text-3xl"
                    aria-hidden="true"
                  ></ion-icon>
                </a>
              </li>
            </ul>
          </nav>

          <a
            id="emailLink"
            href=""
            aria-label="Enviar um e-mail"
            title="Enviar E-mail"
            class="font-mono text-xs tracking-wider text-slate-500 hover:text-amber-500 transition-colors focus:outline-none focus:ring-2 focus:ring-amber-500 rounded-sm px-1 py-0.5 break-all sm:break-normal text-left sm:text-right"
          ></a>
        </div>
      </section>
    </main>

    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
